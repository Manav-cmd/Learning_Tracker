{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <title>Learning Progress Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <!-- Icons -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
  >

  <!-- App Theme -->
  <link rel="stylesheet" href="{% static 'css/theme.css' %}">
</head>

<body>

<!-- ================= NAVBAR ================= -->
<nav class="navbar navbar-expand-lg navbar-glass">
  <div class="container-xl">

    <!-- LEFT -->
    <a class="navbar-brand fw-bold" href="{% url 'home' %}">
      <span class="brand-mark">📘</span> LearningTracker
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain" aria-controls="navbarMain" aria-expanded="false" aria-label="Toggle navigation menu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- RIGHT -->
    <div class="collapse navbar-collapse" id="navbarMain">
      <div class="ms-auto d-flex align-items-center gap-2 gap-lg-3">

        <a href="{% url 'about' %}" class="nav-link">About</a>

        {% if user.is_authenticated %}
          <a href="{% url 'dashboard' %}" class="nav-link">Dashboard</a>
          <a href="{% url 'add_topic' %}" class="nav-link">Add Topic</a>
          <a href="{% url 'logout' %}" class="nav-link">Logout</a>
        {% else %}
          <a href="{% url 'login' %}" class="btn btn-ghost">Login</a>
        {% endif %}

        <button
          id="themeToggle"
          class="btn btn-icon"
          type="button"
          aria-label="Toggle theme"
        >
          <i class="bi bi-sun-fill"></i>
        </button>
      </div>
    </div>

  </div>
</nav>

<!-- ================= MAIN ================= -->
<main class="page-shell">
  {% block content %}{% endblock %}
</main>

<!-- ================= FOOTER ================= -->
<footer class="app-footer py-4">
  <div class="container-xl d-flex flex-column flex-lg-row justify-content-between align-items-center gap-3">
    <span class="text-muted">© 2026 Learning Progress Tracker</span>
    <div class="d-flex gap-3">
      <a class="footer-link" href="{% url 'about' %}">About</a>
      <a class="footer-link" href="https://github.com/Manav-cmd" target="_blank" rel="noreferrer noopener" aria-label="Visit our GitHub repository (opens in new tab)">
        <i class="bi bi-github"></i>
      </a>
      <a class="footer-link" href="mailto:contact@learningtracker.app" aria-label="Send us an email">
        <i class="bi bi-envelope-fill"></i>
      </a>
    </div>
  </div>
</footer>

<!-- ================= SCRIPTS ================= -->

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- App JS -->
<script src="{% static 'js/app.js' %}"></script>

</body>
</html>
