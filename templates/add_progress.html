{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">

    <div class="card tracker-card p-4">
      <h3 class="fw-bold mb-4">Add Progress</h3>
      <p class="text-muted mb-3">
        {{ topic.subject }} — {{ topic.title }}
      </p>

      <form method="post">
        {% csrf_token %}

        <div class="mb-3">
          <label class="form-label">Effort (minutes)</label>
          <input
            type="number"
            name="effort"
            class="form-control"
            min="1"
            required
          >
        </div>

        <div class="mb-4">
          <label class="form-label">Notes (optional)</label>
          <textarea
            name="note"
            class="form-control"
            rows="3"
            placeholder="What did you cover today?"
          ></textarea>
        </div>

        <button class="btn btn-primary w-100 btn-lg">
          Save Progress
        </button>
      </form>

      <div class="mt-3 text-center">
        <a href="{% url 'dashboard' %}">← Back to Dashboard</a>
      </div>
    </div>

  </div>
</div>
{% endblock %}
